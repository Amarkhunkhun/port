<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#070708; }
  * { box-sizing:border-box; }
  @keyframes ak-twinkle { 0%,100%{opacity:.12} 50%{opacity:1} }
  @keyframes ak-drift { 0%{transform:translateY(0)} 100%{transform:translateY(-22px)} }
</style>
</helmet>

<div id="track" style="height:1180vh; position:relative; background:#070708;">

  <div id="stage" style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden; background:transparent;">

    <!-- background color plate -->
    <div id="scene-bg" style="position:absolute; inset:0; background:#070708; pointer-events:none;"></div>

    <!-- twinkling starfield -->
    <div id="stars" style="position:absolute; inset:-10%; opacity:0; pointer-events:none; will-change:transform,opacity;"></div>

    <!-- intro background frame (user-supplied) with seamless looping warp -->
    <svg width="0" height="0" style="position:absolute; pointer-events:none;" aria-hidden="true">
      <defs>
        <filter id="intro-warp" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
          <feTurbulence id="warp-turb" type="fractalNoise" baseFrequency="0.0105 0.0115" numOctaves="2" seed="4" result="noise"></feTurbulence>
          <feDisplacementMap id="warp-disp" in="SourceGraphic" in2="noise" scale="26" xChannelSelector="R" yChannelSelector="G" result="disp"></feDisplacementMap>
        </filter>
      </defs>
    </svg>
    <div id="frame" style="position:absolute; inset:0; overflow:hidden; pointer-events:none; will-change:opacity;">
      <img src="assets/intro-bg.jpg" alt="" style="position:absolute; left:-2%; top:-2%; width:104%; height:104%; object-fit:fill; display:block; filter:url(#intro-warp);">
    </div>

    <!-- intro name: segmented so the middle letters collapse, pulling A + K together -->
    <div id="name" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) scale(1); will-change:transform,opacity; color:#ededed; font-family:'Archivo',sans-serif; font-weight:800; font-size:clamp(28px,4.6vw,68px); letter-spacing:.02em; line-height:1; display:flex; align-items:flex-end; justify-content:center; white-space:nowrap; pointer-events:none;"><span style="display:inline-block;">A</span><span data-shrink style="display:inline-block; overflow:hidden; white-space:pre;">MAR</span><span data-gap style="display:inline-block; flex:0 0 auto;"></span><span style="display:inline-block;">K</span><span data-shrink style="display:inline-block; overflow:hidden; white-space:pre;">HUNKHUN</span></div>
    <div id="sub" style="position:absolute; left:50%; top:calc(50% + clamp(34px,4.4vw,60px)); transform:translate(-50%,-50%); will-change:opacity; color:#8d8d92; font-family:'Archivo',sans-serif; font-weight:600; font-size:clamp(10px,1.05vw,15px); letter-spacing:.42em; white-space:nowrap; pointer-events:none;">DIGITAL ART &nbsp;&minus;&nbsp; PHOTOGRAPHS</div>

    <!-- scroll cue -->
    <div id="cue" style="position:absolute; left:50%; bottom:5vh; transform:translateX(-50%); color:#6d6d73; font-family:'Archivo',sans-serif; font-weight:600; font-size:11px; letter-spacing:.34em; text-align:center; pointer-events:none;">SCROLL<div style="margin-top:9px; font-size:15px; animation:ak-drift 1.3s ease-in-out infinite alternate;">&darr;</div></div>

    <!-- MyWork title -->
    <div id="mywork" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) scale(1); will-change:transform,opacity; opacity:0; color:#141416; font-family:'Archivo Black',sans-serif; font-size:clamp(60px,11vw,150px); letter-spacing:-.02em; line-height:.9; white-space:nowrap; pointer-events:none;">MyWork</div>

    <!-- gallery arc -->
    <div id="gallery" style="position:absolute; inset:0; opacity:0; pointer-events:none; will-change:opacity;">
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-01.jpg" alt="" loading="eager" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-02.jpg" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-03.jpg" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-04.jpg" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-05.jpg" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-06.jpg" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-07.jpg" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-08.jpg" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-09.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-10.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-11.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-12.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-13.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-14.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-15.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-16.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
      <div data-art style="position:absolute; left:0; top:0; width:clamp(140px,18vw,310px); height:clamp(98px,12vw,200px); opacity:0; transform:translate(-300px,-300px); will-change:transform,opacity; border-radius:7px; overflow:hidden; background:#0d0d0f; box-shadow:0 22px 55px rgba(0,0,0,.4);"><img src="gallery/art-17.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>
    </div>

    <!-- lightbox: click a piece to view it full-size -->
    <div id="lightbox" style="position:fixed; inset:0; z-index:9999; display:none; align-items:center; justify-content:center; background:rgba(5,5,7,.94); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); opacity:0; transition:opacity .32s ease; cursor:zoom-out; padding:5vh 6vw;">
      <img id="lightbox-img" alt="" style="max-width:90vw; max-height:90vh; object-fit:contain; border-radius:6px; box-shadow:0 36px 110px rgba(0,0,0,.7); transform:scale(.9); transition:transform .32s cubic-bezier(.2,.8,.25,1); cursor:default;">
      <button id="lb-close" aria-label="Close" style="position:absolute; top:22px; right:26px; width:48px; height:48px; border:none; border-radius:50%; background:rgba(255,255,255,.1); color:#fff; font-family:'Archivo',sans-serif; font-size:24px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;">&times;</button>
      <button id="lb-prev" aria-label="Previous" style="position:absolute; left:max(20px,3vw); top:50%; transform:translateY(-50%); width:56px; height:56px; border:none; border-radius:50%; background:rgba(255,255,255,.08); color:#fff; font-family:'Archivo',sans-serif; font-size:26px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;">&#8249;</button>
      <button id="lb-next" aria-label="Next" style="position:absolute; right:max(20px,3vw); top:50%; transform:translateY(-50%); width:56px; height:56px; border:none; border-radius:50%; background:rgba(255,255,255,.08); color:#fff; font-family:'Archivo',sans-serif; font-size:26px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;">&#8250;</button>
      <div id="lb-count" style="position:absolute; bottom:26px; left:50%; transform:translateX(-50%); color:#9a9aa2; font-family:'Archivo',sans-serif; font-size:13px; font-weight:600; letter-spacing:.22em;"></div>
    </div>

    <!-- about me -->
    <div id="about" style="position:absolute; inset:0; opacity:0; display:flex; align-items:center; justify-content:center; padding:6vw; pointer-events:none;">
      <div style="display:flex; align-items:center; gap:clamp(28px,5vw,72px); width:100%; max-width:1180px;">
        <div id="portrait" style="flex:0 0 auto; width:clamp(220px,30vw,400px); aspect-ratio:3/4; border-radius:8px; overflow:hidden; opacity:0; will-change:transform,opacity; background:#16161a; border:1px solid rgba(255,255,255,.12);">
          <img src="assets/portrait.jpg" alt="Amar Khunkhun" style="width:100%; height:100%; object-fit:cover; display:block;">
        </div>
        <div style="flex:1 1 auto; color:#f0f0f2; font-family:'Archivo',sans-serif;">
          <div style="font-family:'Archivo Black',sans-serif; font-size:clamp(38px,5.4vw,76px); line-height:.96; letter-spacing:-.01em;">ABOUT ME</div>
          <p id="bio" style="margin:clamp(18px,2.4vw,30px) 0 0; max-width:46ch; font-size:clamp(15px,1.25vw,19px); line-height:1.62; font-weight:500; color:#c7c7cd;">{{ bio }}</p>
          <a href="{{ igHref }}" target="_blank" rel="noopener" style="pointer-events:auto; display:inline-flex; align-items:center; gap:10px; margin-top:clamp(20px,2.6vw,32px); color:#fff; text-decoration:none; font-weight:700; font-size:clamp(14px,1.15vw,17px); letter-spacing:.02em; border-bottom:1px solid rgba(255,255,255,.35); padding-bottom:3px;">
            <span style="font-size:1.05em;">&#9711;</span>{{ ig }}
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;bioText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;I'm Amar Khunkhun \u2014 a digital artist and photographer. I shoot the world as I find it and rebuild it into something stranger: photographs gathered from the road, renders pulled from somewhere else entirely. Everything here is mine.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;instagram&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;@amarr_kk&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const ig = this.props.instagram ?? "@amarr_kk";
    const handle = ig.replace(/^@/, "");
    return {
      bio: this.props.bioText ?? "I'm Amar Khunkhun \u2014 a digital artist and photographer. I shoot the world as I find it and rebuild it into something stranger: photographs gathered from the road, renders pulled from somewhere else entirely. Everything here is mine.",
      ig,
      igHref: "https://instagram.com/" + handle,
    };
  }

  componentDidMount() {
    this.cache();
    this.buildStars();
    this.measureName();
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => { this.measureName(); this.update(); });
    this._onResize = () => { this.measureName(); this._lastY = -1; this.update(); };
    window.addEventListener("resize", this._onResize);
    // Continuous rAF poll — robust against listener/hot-reload quirks; cheap thanks to change detection.
    this._lastY = -1;
    this._alive = true;
    const loop = () => {
      if (!this._alive) return;
      this.update();
      this._raf = requestAnimationFrame(loop);
    };
    this._raf = requestAnimationFrame(loop);
    this.update();
    setTimeout(() => { this._lastY = -1; this.update(); }, 60);
    setTimeout(() => { this._lastY = -1; this.update(); }, 400);
  }

  componentDidUpdate() {
    this.cache();
    if (this.els.stars && this.els.stars.childElementCount === 0) this.buildStars();
    this.measureName();
    this.update();
  }

  componentWillUnmount() {
    this._alive = false;
    if (this._raf) cancelAnimationFrame(this._raf);
    window.removeEventListener("resize", this._onResize);
    if (this._onKey) window.removeEventListener("keydown", this._onKey);
  }

  cache() {
    const $ = (id) => document.getElementById(id);
    this.els = {
      track: $("track"), bg: $("scene-bg"), frame: $("frame"), name: $("name"),
      sub: $("sub"), cue: $("cue"), mywork: $("mywork"),
      gallery: $("gallery"), stars: $("stars"), about: $("about"), portrait: $("portrait"),
      shrink: Array.prototype.slice.call(document.querySelectorAll("[data-shrink]")),
      gap: document.querySelector("[data-gap]"),
      cards: Array.prototype.slice.call(document.querySelectorAll("[data-art]")),
      lb: $("lightbox"), lbImg: $("lightbox-img"), lbClose: $("lb-close"),
      lbPrev: $("lb-prev"), lbNext: $("lb-next"), lbCount: $("lb-count"),
      warpTurb: $("warp-turb"), warpDisp: $("warp-disp"),
    };
    this.bindGallery();
  }

  bindGallery() {
    const E = this.els;
    if (E.cards.length && !E.cards[0]._bound) {
      E.cards.forEach((card, i) => {
        card._bound = true;
        card._hv = 0; card._hvTarget = 0;
        card.style.cursor = "pointer";
        card.addEventListener("mouseenter", () => { card._hvTarget = 1; this.animateHover(); });
        card.addEventListener("mouseleave", () => { card._hvTarget = 0; this.animateHover(); });
        card.addEventListener("click", (e) => { e.stopPropagation(); this.openLightbox(i); });
      });
    }
    if (E.lb && !E.lb._bound) {
      E.lb._bound = true;
      E.lb.addEventListener("click", () => this.closeLightbox());
      E.lbImg.addEventListener("click", (e) => e.stopPropagation());
      E.lbClose.addEventListener("click", (e) => { e.stopPropagation(); this.closeLightbox(); });
      E.lbPrev.addEventListener("click", (e) => { e.stopPropagation(); this.stepLightbox(-1); });
      E.lbNext.addEventListener("click", (e) => { e.stopPropagation(); this.stepLightbox(1); });
      this._onKey = (e) => {
        if (E.lb.style.display !== "flex") return;
        if (e.key === "Escape") this.closeLightbox();
        else if (e.key === "ArrowLeft") this.stepLightbox(-1);
        else if (e.key === "ArrowRight") this.stepLightbox(1);
      };
      window.addEventListener("keydown", this._onKey);
    }
  }

  animateHover() {
    if (this._hoverRAF) return;
    const tick = () => {
      let moving = false;
      this.els.cards.forEach((c) => {
        const d = (c._hvTarget || 0) - (c._hv || 0);
        if (Math.abs(d) > 0.012) { c._hv = (c._hv || 0) + d * 0.22; moving = true; }
        else c._hv = c._hvTarget || 0;
      });
      this.update();
      this._hoverRAF = moving ? requestAnimationFrame(tick) : null;
    };
    this._hoverRAF = requestAnimationFrame(tick);
  }

  openLightbox(i) {
    const E = this.els;
    this._lbIndex = i;
    E.lbImg.src = E.cards[i].querySelector("img").src;
    E.lbCount.textContent = (i + 1) + " / " + E.cards.length;
    E.lb.style.display = "flex";
    requestAnimationFrame(() => { E.lb.style.opacity = "1"; E.lbImg.style.transform = "scale(1)"; });
  }

  stepLightbox(dir) {
    const n = this.els.cards.length;
    this.openLightbox((this._lbIndex + dir + n) % n);
  }

  closeLightbox() {
    const E = this.els;
    E.lb.style.opacity = "0";
    E.lbImg.style.transform = "scale(.9)";
    clearTimeout(this._lbTimer);
    this._lbTimer = setTimeout(() => { E.lb.style.display = "none"; }, 320);
  }

  buildStars() {
    const c = this.els && this.els.stars;
    if (!c) return;
    c.innerHTML = "";
    let html = "";
    for (let i = 0; i < 170; i++) {
      const x = (Math.random() * 100).toFixed(2);
      const y = (Math.random() * 100).toFixed(2);
      const s = (Math.random() * 1.9 + 0.6).toFixed(2);
      const dur = (Math.random() * 3.5 + 2).toFixed(2);
      const del = (Math.random() * 4).toFixed(2);
      const big = Math.random() > 0.93;
      const glow = big ? "box-shadow:0 0 6px 1px rgba(255,255,255,.7);" : "";
      html += `<span style="position:absolute; left:${x}%; top:${y}%; width:${s}px; height:${s}px; border-radius:50%; background:#fff; ${glow} animation:ak-twinkle ${dur}s ease-in-out ${del}s infinite;"></span>`;
    }
    c.innerHTML = html;
  }

  measureName() {
    if (!this.els || !this.els.shrink) return;
    this.els.shrink.forEach((el) => { el.style.width = "auto"; });
    this._nw = this.els.shrink.map((el) => el.getBoundingClientRect().width);
  }

  update() {
    const E = this.els; if (!E || !E.track) return;
    const vh = window.innerHeight, vw = window.innerWidth;
    const max = E.track.offsetHeight - vh;
    const st = window.scrollY != null ? window.scrollY : document.documentElement.scrollTop;
    const p = max > 0 ? Math.max(0, Math.min(1, st / max)) : 0;

    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const seg = (a, b) => clamp((p - a) / (b - a), 0, 1);
    const lerp = (a, b, t) => a + (b - a) * t;
    const eIO = (t) => t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const eIn = (t) => t * t;

    // ---- background color
    const BLACK = [7, 7, 8], GREY = [231, 231, 231];
    const gA = seg(0.21, 0.30);
    const bA = seg(0.665, 0.735);
    let col = [0, 0, 0];
    for (let i = 0; i < 3; i++) {
      let v = lerp(BLACK[i], GREY[i], gA);
      v = lerp(v, BLACK[i], bA);
      col[i] = Math.round(v);
    }
    E.bg.style.background = `rgb(${col[0]},${col[1]},${col[2]})`;

    // ---- intro name: physically collapse "AMAR KHUNKHUN" into "AK" (no fade), then zoom
    const collapse = eIO(seg(0.05, 0.18));
    if (this._nw) {
      for (let i = 0; i < E.shrink.length; i++) {
        E.shrink[i].style.width = (this._nw[i] * (1 - collapse)).toFixed(2) + "px";
      }
    }
    if (E.gap) {
      const fs = parseFloat(getComputedStyle(E.name).fontSize) || 60;
      E.gap.style.width = (fs * 0.34 * (1 - collapse)).toFixed(2) + "px";
    }
    const zt = eIn(seg(0.19, 0.30));
    E.name.style.transform = `translate(-50%,-50%) scale(${lerp(1, 26, zt).toFixed(3)})`;
    E.name.style.opacity = (1 - seg(0.285, 0.30)).toFixed(3);
    E.sub.style.opacity = (1 - seg(0.05, 0.09)).toFixed(3);
    E.cue.style.opacity = (1 - seg(0.012, 0.05)).toFixed(3);

    // ---- intro background frame + seamless JS-driven warp (sine waves loop perfectly)
    const frameOp = 1 - seg(0.10, 0.22);
    E.frame.style.opacity = frameOp.toFixed(3);
    if (frameOp > 0.01 && E.warpTurb && E.warpDisp) {
      const t = (performance.now ? performance.now() : Date.now()) / 1000;
      const TAU = Math.PI * 2;
      const fx = (0.0105 + 0.0028 * Math.sin(t * TAU / 19)).toFixed(5);
      const fy = (0.0118 + 0.0024 * Math.sin(t * TAU / 23 + 1.3)).toFixed(5);
      const scale = (27 + 13 * Math.sin(t * TAU / 11)).toFixed(2);
      E.warpTurb.setAttribute("baseFrequency", fx + " " + fy);
      E.warpDisp.setAttribute("scale", scale);
    }

    // ---- MyWork
    const mwz = eIn(seg(0.66, 0.75));
    E.mywork.style.transform = `translate(-50%,-50%) scale(${lerp(1, 24, mwz).toFixed(3)})`;
    E.mywork.style.opacity = (seg(0.30, 0.40) * (1 - seg(0.715, 0.75))).toFixed(3);

    // ---- gallery arc
    const gOp = seg(0.40, 0.45) * (1 - seg(0.635, 0.665));
    E.gallery.style.opacity = gOp.toFixed(3);
    if (gOp > 0.001) {
      const gT = seg(0.40, 0.66);
      const D2R = Math.PI / 180;
      const cards = E.cards, n = cards.length;
      const step = 26;                     // deg between pieces
      const start = -95 - (n - 1) * step;  // all off to the left at gT=0
      const sweep = 620;                   // total travel
      const cx = vw / 2, cyBase = vh * 0.56, R = vh * 0.98;
      for (let i = 0; i < n; i++) {
        const aDeg = start + i * step + gT * sweep;
        const card = cards[i];
        if (aDeg < -92 || aDeg > 92) { card.style.opacity = "0"; card.style.pointerEvents = "none"; continue; }
        const a = aDeg * D2R;
        const x = cx + R * Math.sin(a);
        const y = cyBase + R * (1 - Math.cos(a));
        const depth = Math.cos(a);
        const hv = card._hv || 0;
        const sc = lerp(0.46, 1.16, clamp(depth, 0, 1)) * lerp(1, 1.24, hv);
        const rot = aDeg * (1 - 0.65 * hv);   // straightens as it pops forward on hover
        const op = clamp((92 - Math.abs(aDeg)) / 16, 0, 1) * gOp;
        card.style.transform = `translate(${x.toFixed(1)}px,${y.toFixed(1)}px) translate(-50%,-50%) rotate(${rot.toFixed(2)}deg) scale(${sc.toFixed(3)})`;
        card.style.opacity = op.toFixed(3);
        card.style.zIndex = hv > 0.05 ? "900" : String(Math.round(depth * 100));
        card.style.pointerEvents = op > 0.12 ? "auto" : "none";
        card.style.filter = hv > 0.001 ? `brightness(${(1 + 0.14 * hv).toFixed(3)})` : "none";
        card.style.boxShadow = `0 ${(22 + 26 * hv).toFixed(0)}px ${(55 + 34 * hv).toFixed(0)}px rgba(0,0,0,${(0.4 + 0.22 * hv).toFixed(3)})`;
      }
    } else {
      for (let i = 0; i < E.cards.length; i++) E.cards[i].style.pointerEvents = "none";
    }

    // ---- stars
    E.stars.style.opacity = seg(0.675, 0.74).toFixed(3);
    E.stars.style.transform = `scale(${lerp(1, 1.28, seg(0.675, 1)).toFixed(4)})`;

    // ---- about me
    E.about.style.opacity = seg(0.80, 0.90).toFixed(3);
    E.portrait.style.opacity = seg(0.835, 0.93).toFixed(3);
    E.portrait.style.transform = `translateY(${lerp(38, 0, seg(0.82, 0.93)).toFixed(1)}px)`;
  }
}
</script>
